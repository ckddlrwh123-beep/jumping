<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점핑다이어트 영상 모음</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f2f2f2; }
.app { max-width: 480px; margin: 0 auto; background: #f2f2f2; min-height: 100vh; }

.header { background: #FF0000; padding: 16px 18px 14px; display: flex; align-items: center; gap: 12px; }
.header-icon { width: 36px; height: 24px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.play-tri { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 12px solid #FF0000; margin-left: 3px; }
.header-text h1 { color: white; font-size: 19px; font-weight: 700; }
.header-text p { color: rgba(255,255,255,0.85); font-size: 12px; margin-top: 2px; }

.filter-bar { background: white; border-bottom: 1px solid #e8e8e8; padding: 10px 14px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { border: 1.5px solid #ddd; background: white; color: #555; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; font-weight: 500; }
.filter-btn.active { background: #FF0000; border-color: #FF0000; color: white; }

.action-bar { display: flex; gap: 8px; padding: 12px 12px 4px; }
.shuffle-btn { flex: 1; background: #FF0000; color: white; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.15s; }
.shuffle-btn:hover { background: #cc0000; }
.shuffle-btn:disabled { background: #ffaaaa; cursor: not-allowed; }
.reload-btn { background: white; color: #333; border: 1.5px solid #ddd; border-radius: 10px; padding: 11px 14px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; font-weight: 500; transition: all 0.15s; }
.reload-btn:hover { border-color: #FF0000; color: #FF0000; }
.reload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.count-bar { padding: 8px 14px 2px; font-size: 12px; color: #999; }

.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 6px 12px 24px; }
.card { background: white; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.13); }
.card:active { transform: scale(0.97); }
.thumb { width: 100%; aspect-ratio: 16/9; background: #ddd; position: relative; overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.duration-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.82); color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; background: rgba(0,0,0,0.2); transition: opacity 0.15s; }
.card:hover .play-overlay { opacity: 1; }
.play-circle { width: 38px; height: 38px; background: rgba(255,255,255,0.93); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.play-arrow { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 13px solid #FF0000; margin-left: 3px; }
.card-body { padding: 9px 10px 11px; }
.card-title { font-size: 12.5px; font-weight: 500; color: #222; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { font-size: 11px; color: #aaa; margin-top: 4px; }

.loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
.spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: #FF0000; border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-box { margin: 20px 14px; background: white; border-radius: 12px; padding: 24px 20px; text-align: center; font-size: 13px; color: #666; line-height: 1.8; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.error-emoji { font-size: 32px; margin-bottom: 10px; }
.error-msg { color: #bbb; font-size: 11px; margin-top: 6px; }
.retry-btn { margin-top: 16px; background: #FF0000; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; font-weight: 600; cursor: pointer; }
.empty { text-align: center; padding: 50px 20px; color: #bbb; font-size: 13px; grid-column: 1/-1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon"><div class="play-tri"></div></div>
    <div class="header-text">
      <h1>점핑다이어트</h1>
      <p id="subtitle">영상 불러오는 중...</p>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')">전체</button>
    <button class="filter-btn" onclick="setFilter('10-20')">10~20분</button>
    <button class="filter-btn" onclick="setFilter('20-30')">20~30분</button>
    <button class="filter-btn" onclick="setFilter('30-40')">30~40분</button>
    <button class="filter-btn" onclick="setFilter('40+')">40분+</button>
  </div>

  <div class="action-bar">
    <button class="shuffle-btn" id="shuffleBtn" onclick="doShuffle()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <polyline points="16 3 21 3 21 8"/>
        <line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/>
        <line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
      랜덤 섞기
    </button>
    <button class="reload-btn" id="reloadBtn" onclick="init()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      처음부터
    </button>
  </div>

  <div class="count-bar" id="countBar"></div>
  <div id="content">
    <div class="loading"><div class="spinner"></div>점핑다이어트 영상 검색 중...</div>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyA-Wi7g_K24NWqqlAC-TjrbewPoto2CoBM';

const KEYWORDS = [
  '점핑다이어트',
  '점핑다이어트 홈트',
  '점핑 유산소 운동',
  '점핑다이어트 루틴',
  '점핑 다이어트 전신운동',
  '점핑다이어트 따라하기',
  '점핑피트니스',
  '점핑 칼로리 소모',
];

// 필터 정의: { min, max } (max=null이면 상한 없음)
const FILTERS = {
  'all':   { min: 0,  max: null },
  '10-20': { min: 10, max: 20 },
  '20-30': { min: 20, max: 30 },
  '30-40': { min: 30, max: 40 },
  '40+':   { min: 40, max: null },
};
const FILTER_KEYS = ['all','10-20','20-30','30-40','40+'];

let allVideos = [];
let currentFilter = 'all';
let usedKeywords = new Set();
let pageTokenMap = {}; // keyword → pageToken

function isoToMins(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*60) + parseInt(m[2]||0);
}

function isoToStr(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '0:00';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

function setFilter(val) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach((b, i) => {
    b.classList.toggle('active', FILTER_KEYS[i] === val);
  });
  renderGrid();
}

function applyFilterToVideos(videos) {
  const { min, max } = FILTERS[currentFilter];
  return videos.filter(v => v.mins >= min && (max === null || v.mins < max));
}

function renderGrid() {
  const filtered = applyFilterToVideos(allVideos);
  const label = currentFilter === 'all' ? '전체' : currentFilter + '분';
  document.getElementById('subtitle').textContent = `${label} 영상 ${filtered.length}개 · 눌러서 시청`;
  document.getElementById('countBar').textContent = `총 ${filtered.length}개`;

  if (filtered.length === 0) {
    document.getElementById('content').innerHTML = '<div class="grid"><div class="empty">해당 구간 영상이 없어요 😅<br><small style="font-size:11px;margin-top:6px;display:block;">랜덤 섞기로 새 영상을 불러와보세요!</small></div></div>';
    return;
  }

  const html = filtered.map(v => `
    <div class="card" onclick="window.open('https://www.youtube.com/watch?v=${v.id}','_blank')">
      <div class="thumb">
        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy" alt="">
        <div class="duration-badge">${v.durStr}</div>
        <div class="play-overlay"><div class="play-circle"><div class="play-arrow"></div></div></div>
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">${v.channel} · ${v.mins}분</div>
      </div>
    </div>
  `).join('');
  document.getElementById('content').innerHTML = `<div class="grid">${html}</div>`;
}

function setLoadingState(msg) {
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>${msg}</div>`;
  document.getElementById('subtitle').textContent = '검색 중...';
  document.getElementById('countBar').textContent = '';
  document.getElementById('shuffleBtn').disabled = true;
  document.getElementById('reloadBtn').disabled = true;
}

function setReady() {
  document.getElementById('shuffleBtn').disabled = false;
  document.getElementById('reloadBtn').disabled = false;
}

function showError(msg) {
  document.getElementById('subtitle').textContent = '불러오기 실패';
  document.getElementById('countBar').textContent = '';
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <div class="error-emoji">😢</div>
      <div>영상을 불러오지 못했어요.</div>
      <div class="error-msg">${msg}</div>
      <button class="retry-btn" onclick="init()">다시 시도</button>
    </div>`;
  setReady();
}

// 아직 안 쓴 키워드 중 랜덤 선택, 다 썼으면 초기화
function pickKeyword() {
  const remaining = KEYWORDS.filter(k => !usedKeywords.has(k));
  if (remaining.length === 0) {
    usedKeywords.clear();
    return KEYWORDS[Math.floor(Math.random() * KEYWORDS.length)];
  }
  const kw = remaining[Math.floor(Math.random() * remaining.length)];
  usedKeywords.add(kw);
  return kw;
}

async function fetchBatch(keyword, usePageToken) {
  const tokenParam = (usePageToken && pageTokenMap[keyword]) ? `&pageToken=${pageTokenMap[keyword]}` : '';
  const url =
    'https://www.googleapis.com/youtube/v3/search' +
    '?part=snippet' +
    '&q=' + encodeURIComponent(keyword) +
    '&type=video' +
    '&maxResults=25' +
    '&relevanceLanguage=ko' +
    '&regionCode=KR' +
    '&key=' + API_KEY +
    tokenParam;

  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  if (data.nextPageToken) pageTokenMap[keyword] = data.nextPageToken;
  return data.items.map(i => i.id.videoId);
}

async function fetchDetails(ids) {
  const res = await fetch(
    'https://www.googleapis.com/youtube/v3/videos' +
    '?part=contentDetails,snippet' +
    '&id=' + ids.join(',') +
    '&key=' + API_KEY
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.items.map(v => {
    const iso = v.contentDetails.duration;
    const mins = isoToMins(iso);
    if (mins < 5) return null;
    return { id: v.id, title: v.snippet.title, channel: v.snippet.channelTitle, mins, durStr: isoToStr(iso) };
  }).filter(Boolean);
}

// 처음 로드
async function init() {
  usedKeywords.clear();
  pageTokenMap = {};
  allVideos = [];
  setLoadingState('점핑다이어트 영상 검색 중...');
  try {
    // 키워드 3개 동시 검색
    const kws = [pickKeyword(), pickKeyword(), pickKeyword()];
    const idArrays = await Promise.all(kws.map(kw => fetchBatch(kw, false)));
    const ids = [...new Set(idArrays.flat())];
    allVideos = await fetchDetails(ids);
    allVideos.sort(() => Math.random() - 0.5);
    setReady();
    renderGrid();
  } catch(e) {
    showError(e.message);
  }
}

// 랜덤 섞기 = 새 키워드로 완전히 새 검색
async function doShuffle() {
  setLoadingState('새 영상 검색 중... 🔀');
  try {
    // 안 쓴 키워드 2개로 새 검색
    const kws = [pickKeyword(), pickKeyword()];
    const idArrays = await Promise.all(kws.map(kw => fetchBatch(kw, true)));
    const ids = [...new Set(idArrays.flat())];
    const newVideos = await fetchDetails(ids);

    // 기존과 합치고 중복 제거 후 다시 랜덤 정렬
    const existingIds = new Set(allVideos.map(v => v.id));
    const merged = [...allVideos, ...newVideos.filter(v => !existingIds.has(v.id))];
    allVideos = merged.sort(() => Math.random() - 0.5);

    setReady();
    renderGrid();
  } catch(e) {
    showError(e.message);
  }
}

init();
</script>
</body>
</html>
