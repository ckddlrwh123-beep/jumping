<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점핑다이어트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f2f2f2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
}

h1 {
  font-size: 32px;
  font-weight: 900;
  color: #222;
  margin-bottom: 8px;
  text-align: center;
}
p {
  font-size: 16px;
  color: #888;
  margin-bottom: 40px;
  text-align: center;
}

.main-btn {
  width: 100%;
  max-width: 420px;
  background: #FF0000;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 28px 20px;
  font-size: 26px;
  font-weight: 900;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 24px;
  box-shadow: 0 6px 24px rgba(255,0,0,0.25);
  letter-spacing: -0.5px;
}

.section-title {
  font-size: 17px;
  font-weight: 700;
  color: #555;
  margin-bottom: 14px;
  text-align: center;
}

.time-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  width: 100%;
  max-width: 420px;
}

.time-btn {
  background: white;
  border: 2px solid #eee;
  border-radius: 16px;
  padding: 22px 10px;
  font-size: 20px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  color: #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.time-btn span.label {
  font-size: 13px;
  font-weight: 400;
  color: #aaa;
}
</style>
</head>
<body>

<h1>🏃 점핑다이어트</h1>
<p>원하는 영상을 눌러보세요!</p>

<button class="main-btn" onclick="open('전체')">
  ▶ 점핑다이어트 영상 보기
</button>

<div class="section-title">시간대별로 보기</div>

<div class="time-grid">
  <button class="time-btn" onclick="open('10분')">
    ⏱ 10분
    <span class="label">가볍게</span>
  </button>
  <button class="time-btn" onclick="open('20분')">
    ⏱ 20분
    <span class="label">적당히</span>
  </button>
  <button class="time-btn" onclick="open('30분')">
    ⏱ 30분
    <span class="label">열심히</span>
  </button>
  <button class="time-btn" onclick="open('40분')">
    ⏱ 40분+
    <span class="label">빡세게</span>
  </button>
</div>

<script>
function open(type) {
  const queries = {
    '전체': '점핑 다이어트 영상',
    '10분': '점핑 다이어트 10분',
    '20분': '점핑 다이어트 20분',
    '30분': '점핑 다이어트 30분',
    '40분': '점핑 다이어트 40분',
  };
  const q = encodeURIComponent(queries[type]);
  window.location.href = `https://www.youtube.com/results?search_query=${q}`;
}
</script>

</body>
</html>
